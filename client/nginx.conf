# nginx serves the built React app AND reverse-proxies the API to the Node
# container, so the browser only ever talks to ONE origin (same-origin) — which
# is why the auth cookie works without cross-site / CORS gymnastics.

# --- HTTP :80 — serves the ACME challenge, redirects everything else to HTTPS ---
server {
    listen 80;
    server_name assessly.ddnsgeek.com;

    # Let's Encrypt HTTP-01 challenge path (must stay on HTTP for cert renewals).
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Everything else → HTTPS.
    location / {
        return 301 https://$host$request_uri;
    }
}

# --- HTTPS :443 — the real site ---
server {
    listen 443 ssl;
    server_name assessly.ddnsgeek.com;

    ssl_certificate     /etc/letsencrypt/live/assessly.ddnsgeek.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/assessly.ddnsgeek.com/privkey.pem;

    # Resume PDFs can be up to 5MB (multer limit) — raise nginx's default 1MB cap.
    client_max_body_size 10m;

    # API → Node backend (reachable as "server" on the compose network).
    # proxy_pass has no URI part, so the full /api/... path is preserved.
    location /api/ {
        proxy_pass http://server:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # AI question-generation / answer-scoring can be slow — allow long responses.
        proxy_read_timeout 120s;
    }

    # SPA: serve static assets, fall back to index.html for client-side routes.
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }
}
