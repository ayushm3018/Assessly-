# nginx serves the built React app AND reverse-proxies the API to the Node
# container, so the browser only ever talks to ONE origin (same-origin) — which
# is why the auth cookie works without cross-site / CORS gymnastics.

server {
    listen 80;
    server_name _;

    # Resume PDFs can be up to 5MB (multer limit) — raise nginx's default 1MB cap.
    client_max_body_size 10m;

    # Let's Encrypt HTTP-01 challenge path (used when issuing/renewing the cert).
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # API → Node backend (reachable as "server" on the compose network).
    # proxy_pass has no URI part, so the full /api/... path is preserved.
    location /api/ {
        proxy_pass http://server:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # AI question-generation / answer-scoring can be slow — allow long responses.
        proxy_read_timeout 120s;
    }

    # SPA: serve static assets, fall back to index.html for client-side routes.
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }
}

